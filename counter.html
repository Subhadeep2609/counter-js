<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>counter in js</title>
    <style>
      .center {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      h2 {
        font-size: 48px;
        margin:0;
      }
      .container {
        font-size: 72px;
        font-weight: 700;
      }
      .buttons {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }
      button {
        padding: 10px 20px;
        border-radius: 5px;
        background-color: gray;
        color: white;
        border: none;
        border-radius: 5px;
      }
      button:hover {
        background-color: black;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <h2>Counter</h2>
      <div class="container">0</div>
      <div class="buttons">
        <button class="decrease">decrease</button>
        <button class="reset">reset</button>
        <button class="increase">increase</button>
      </div>
    </div>
    <script src="counter.js"></script>
  </body>
</html>
